name: Refresh feed quality

# Re-probe real video quality (ffprobe) for the curated feeds and cache the peak,
# so the playlist sorts on truth. Monotonic refresh: only upgrades a feed's reading,
# never downgrades — across runs spanning match windows it converges to each feed's best.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 */2 * * *' # every 2 hours (UTC)

permissions:
  contents: write

concurrency:
  group: refresh-quality
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install ffprobe
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Refresh quality cache
        env:
          XTREAM_HOST: ${{ secrets.XTREAM_HOST }}
          XTREAM_USER: ${{ secrets.XTREAM_USER }}
          XTREAM_PASS: ${{ secrets.XTREAM_PASS }}
        run: bun scripts/probe-quality.ts 48 refresh

      - name: Commit refreshed cache if changed
        run: |
          if git diff --quiet -- api/quality-cache.ts; then
            echo "No quality changes this run."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add api/quality-cache.ts
            git commit -m "chore: refresh feed quality cache"
            git push
          fi
